apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-deployment
  namespace: desaklik
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
      - name: api
        image: <ECR_URL>/desaklik-api:latest
        ports:
        - containerPort: 3000
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: url
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-deployment
  namespace: desaklik
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
      - name: web
        image: <ECR_URL>/desaklik-web:latest
        ports:
        - containerPort: 3000
